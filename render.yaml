services:
  - type: web
    runtime: docker
    name: life-os
    plan: free
    branch: main
    autoDeployTrigger: commit
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: LIFE_OS_TIMEZONE
        value: America/Toronto
      - key: LIFE_OS_EXTRACTOR
        value: auto
      - key: LIFE_OS_LLM_TIMEOUT_SECONDS
        value: "60"
      - key: OPENROUTER_MODEL
        value: nvidia/nemotron-3-super-120b-a12b:free
      - key: OPENROUTER_FALLBACK_MODELS
        value: nvidia/nemotron-3-nano-30b-a3b:free
      - key: TELEGRAM_SEND_CONFIRMATIONS
        value: "true"
      - key: TURSO_REPLICA_PATH
        value: /tmp/life-os-turso-replica.sqlite3
      - key: TURSO_SYNC_INTERVAL_SECONDS
        value: "60"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_USER_IDS
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
