services:
  - type: web
    runtime: docker
    name: life-os
    plan: free
    branch: main
    autoDeployTrigger: commit
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: LIFE_OS_TIMEZONE
        value: America/Toronto
      - key: LIFE_OS_WEB_USERNAME
        value: life-os
      - key: LIFE_OS_REQUIRE_WEB_AUTH
        value: "true"
      - key: LIFE_OS_EXTRACTOR
        value: auto
      - key: LIFE_OS_ENABLE_LANGEXTRACT
        value: "false"
      - key: LIFE_OS_LLM_TIMEOUT_SECONDS
        value: "60"
      - key: OPENROUTER_MODEL
        value: nvidia/nemotron-3-super-120b-a12b:free
      - key: LIFE_OS_LANGEXTRACT_MODEL
        value: nvidia/nemotron-3-super-120b-a12b:free
      - key: OPENROUTER_FALLBACK_MODELS
        value: nvidia/nemotron-3-nano-30b-a3b:free
      - key: TELEGRAM_SEND_CONFIRMATIONS
        value: "true"
      - key: GOOGLE_CALENDAR_IDS
        value: primary
      - key: INTEGRATION_SYNC_LOOKAHEAD_DAYS
        value: "7"
      - key: TURSO_REPLICA_PATH
        value: /tmp/life-os-turso-replica.sqlite3
      - key: TURSO_SYNC_INTERVAL_SECONDS
        value: "60"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LIFE_OS_WEB_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_USER_IDS
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_BRIEFING_CHAT_ID
        sync: false
      - key: BRIEFING_CRON_SECRET
        sync: false
      - key: TODOIST_API_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REFRESH_TOKEN
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
